# Render Blueprint — https://render.com/docs/blueprint-spec
#
# One Docker web service built from the repo Dockerfile. The image bundles the
# FastAPI backend and the prebuilt React workspace (src/attest/api/static), so a
# single service serves both the UI and the same-origin API the UI calls.
#
# ATTEST_EDGAR=on enables live SEC tie-out: an uploaded draft tagged with an
# issuer ticker pulls that issuer's as-filed XBRL from EDGAR and ties figures
# out against it. SEC asks automated clients to identify themselves, so set a
# real contact in ATTEST_EDGAR_USER_AGENT. (Only as-filed GAAP facts tie out;
# non-GAAP / operational figures have no filed source and stay untraced.)
#
# EXA_API_KEY enables "Fetch historical": web search (https://exa.ai) for an
# issuer's past earnings releases and call transcripts, reachable from any cloud
# host (unlike SEC, which throttles datacenter IPs). It's a secret, so it carries
# `sync: false` — set its value in the Render dashboard, never in this file.
#
# In-memory state (fact store + audit log) means exactly one instance until a
# persistent store is wired in. Reseeds fresh on each start/deploy.
services:
  # The service name must match the EXISTING Render service so the Blueprint
  # manages it (and keeps the same URL) instead of creating a second one.
  # Render maps Blueprint services to dashboard services by this name.
  - type: web
    name: investor-relations-harness
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    branch: main
    autoDeploy: true
    numInstances: 1
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: ATTEST_EDGAR
        value: "on"
      - key: ATTEST_EDGAR_USER_AGENT
        value: "Attest IR disclosure-verification (contact: max@deerpark.io)"
      - key: EXA_API_KEY
        sync: false   # secret — set in the Render dashboard, never committed
