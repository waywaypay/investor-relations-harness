name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel superseded runs on the same ref so the latest push is what's reported.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (pytest + eval gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"

      - name: Run test suite
        # Includes the figure-tieout regression gate (tests/test_eval.py):
        # figure false-negative rate must be 0.
        run: pytest -q

      - name: Smoke-check the CLI demo
        run: attest demo

  web:
    name: web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
