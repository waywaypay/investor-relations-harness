name: CI

# The eval harness is non-negotiable infrastructure: every push and PR must clear
# the lint, the full test suite, and the golden-set deploy gates before it merges.
on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Test suite (includes the eval regression gate)
        run: pytest

      - name: Eval gates (figure tie-outs · extraction edge · rule engines)
        run: attest eval

      - name: Demo smoke test
        run: attest demo
