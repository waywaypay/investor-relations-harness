name: Deploy web workspace to GitHub Pages

# Publishes the React disclosure-drafting workspace (web/) to GitHub Pages — the
# real product: the document library, "+ Upload", and figure tie-outs. Pages is
# static, so there's no backend: the bundled Meridian close pack ties out from
# client-side data, and uploads fall back to client-side figure detection
# (honestly marked untraced). The app is built with PAGES_BASE set so its hashed
# assets resolve under the repo subpath.

on:
  push:
    branches:
      - main
      - claude/keen-gates-E6OdR
      - claude/dreamy-cori-3GcvU
      - claude/determined-wright-hATEA
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build the workspace for Pages
        # PAGES_BASE makes Vite emit asset URLs under the repo subpath that
        # project Pages serves from (https://<owner>.github.io/<repo>/).
        env:
          PAGES_BASE: /investor-relations-harness/
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload web/dist as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
